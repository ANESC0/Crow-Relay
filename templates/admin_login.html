<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0e0d" />
  <link rel="icon" type="image/png" href="/static/icon.png" />
  <link rel="apple-touch-icon" href="/static/icon.png" />
  <title>Crow-Relay · Connexion admin</title>
  <link rel="stylesheet" href="/static/admin-login.css" />
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/static/icon.png" alt="" />
      Crow-Relay
    </div>
    <div class="admin-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Panneau admin
    </div>
    <p class="subtitle">Saisis la clé admin affichée<br />dans la console de démarrage</p>
    <form method="post">
      <input class="key-input" type="password" name="key" autocomplete="current-password" placeholder="Clé admin" aria-label="Clé admin" autofocus />
      <button class="submit-btn" type="submit">Accéder au panneau</button>
    </form>
    <div class="error-msg">{{ error or "" }}</div>
  </div>
</body>
</html>
