<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0e0d" />
  <link rel="icon" type="image/png" href="/static/icon.png" />
  <link rel="apple-touch-icon" href="/static/icon.png" />
  <title>Crow-Relay · Connexion</title>
  <style>
    :root {
      --bg: #141210; --surface: #26221e;
      --surface-2: #2e2a25; --surface-3: #383028;
      --accent: #f59e0b; --accent-2: #d97706;
      --accent-glow: rgba(245,158,11,.15); --accent-border: rgba(245,158,11,.30);
      --text: #f0ebe3; --muted: #7a7470;
      --border: rgba(255,210,80,.07); --border-2: rgba(255,210,80,.14);
      --danger: #f07070;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: var(--font); background: var(--bg); color: var(--text);
      min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 32px 20px;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 90% 50% at 50% -10%, rgba(245,158,11,.06) 0%, transparent 55%),
        radial-gradient(ellipse 40% 25% at 90% 105%, rgba(180,60,10,.04) 0%, transparent 50%);
    }
    .card {
      position: relative; z-index: 1;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 36px 28px; width: 100%; max-width: 360px;
      text-align: center; box-shadow: 0 18px 50px rgba(0,0,0,.45), 0 1px 3px rgba(0,0,0,.3);
    }
    .logo {
      display: inline-flex; align-items: center; flex-direction: column; gap: 14px;
      font-size: 22px; font-weight: 700; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 28px;
    }
    .logo img {
      width: 84px; height: 84px; object-fit: contain;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      border-radius: 22px; padding: 10px;
      box-shadow: 0 0 32px rgba(245,158,11,.4), 0 8px 24px rgba(0,0,0,.4);
    }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 28px; line-height: 1.6; }
    .pin-input {
      width: 100%; padding: 16px; font-size: 28px; text-align: center;
      letter-spacing: 10px; font-family: ui-monospace, monospace; font-weight: 700;
      border-radius: 14px; border: 1px solid var(--border-2);
      background: var(--surface-2); color: var(--text); outline: none; transition: border-color .15s, box-shadow .15s;
    }
    .pin-input:focus { border-color: var(--accent-border); box-shadow: 0 0 0 3px var(--accent-glow); }
    .pin-input::placeholder { color: var(--border-2); letter-spacing: 4px; font-size: 22px; }
    .submit-btn {
      width: 100%; margin-top: 14px; padding: 14px; border: none; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff; font-family: var(--font); font-size: 15px; font-weight: 700;
      cursor: pointer; transition: opacity .15s, box-shadow .15s;
      box-shadow: 0 2px 14px rgba(245,158,11,.25);
    }
    .submit-btn:hover { opacity: .9; box-shadow: 0 4px 20px rgba(245,158,11,.4); }
    .error-msg { margin-top: 14px; font-size: 13px; font-weight: 600; min-height: 18px; color: var(--danger); }

    /* ── TABLET (≥600px) ── */
    @media (min-width: 600px) {
      .card { max-width: 400px; padding: 44px 40px; }
      .logo img { width: 88px; height: 88px; border-radius: 24px; padding: 11px; }
      .logo { font-size: 24px; letter-spacing: 6px; gap: 16px; }
    }
    /* ── DESKTOP (≥900px) ── */
    @media (min-width: 900px) {
      body { padding: 56px 24px; }
      .card { max-width: 460px; padding: 56px 52px; border-radius: 26px; box-shadow: 0 28px 90px rgba(0,0,0,.55), 0 2px 4px rgba(0,0,0,.3); }
      .logo img { width: 100px; height: 100px; border-radius: 26px; padding: 12px; box-shadow: 0 0 48px rgba(245,158,11,.5), 0 12px 36px rgba(0,0,0,.5); }
      .logo { font-size: 28px; letter-spacing: 7px; gap: 20px; margin-bottom: 32px; }
      .subtitle { font-size: 16px; margin-bottom: 32px; }
      .pin-input { padding: 20px; font-size: 34px; border-radius: 16px; letter-spacing: 14px; }
      .submit-btn { padding: 16px; font-size: 17px; border-radius: 14px; margin-top: 16px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/static/icon.png" alt="" />
      Crow-Relay
    </div>
    <p class="subtitle">Saisis le code PIN affiché<br />sur l'ordinateur hôte</p>
    <form method="post">
      <input class="pin-input" type="password" name="pin" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" placeholder="••••••" aria-label="Code PIN" autofocus />
      <button class="submit-btn" type="submit">Se connecter</button>
    </form>
    <div class="error-msg">{{ error or "" }}</div>
  </div>
</body>
</html>
